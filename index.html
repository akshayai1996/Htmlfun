<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Outfit','Segoe UI',sans-serif;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
min-height:100vh;
padding:40px 20px;
}

.container{
max-width:1200px;
margin:auto;
}

/* HEADER */

header{
text-align:center;
color:white;
margin-bottom:40px;
}

h1{
font-size:3rem;
margin-bottom:10px;
}

.subtitle{
font-size:1.2rem;
opacity:.9;
margin-bottom:24px;
}

/* GitHub Profile Card */

.github-profile-card{
display:inline-flex;
align-items:center;
gap:14px;
background:rgba(0,0,0,.28);
backdrop-filter:blur(14px);
border-radius:60px;
padding:10px 22px 10px 10px;
margin-bottom:30px;
text-decoration:none;
color:white;
transition:.2s;
}

.github-profile-card:hover{
transform:translateY(-2px);
background:rgba(0,0,0,.45);
box-shadow:0 8px 28px rgba(0,0,0,.35);
}

.github-avatar{
width:46px;
height:46px;
border-radius:50%;
border:2px solid rgba(255,255,255,.5);
}

.github-info{
text-align:left;
}

.github-name{
font-weight:700;
}

.github-sub{
font-size:.8rem;
opacity:.75;
display:flex;
gap:6px;
margin-top:3px;
}

.github-dot{
width:7px;
height:7px;
border-radius:50%;
background:#4ade80;
box-shadow:0 0 6px #4ade80;
}

/* STATS */

.stats-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border-radius:15px;
padding:25px;
text-align:center;
color:white;
}

.stat-number{
font-size:2.5rem;
font-weight:bold;
}

/* SEARCH */

.search-box{
width:100%;
padding:15px 20px;
border-radius:50px;
border:none;
font-size:1rem;
margin-bottom:25px;
}

/* FILTER */

.filter-container{
display:flex;
gap:15px;
justify-content:center;
margin-bottom:40px;
flex-wrap:wrap;
}

.filter-btn{
background:rgba(255,255,255,.2);
border:none;
color:white;
padding:10px 25px;
border-radius:25px;
cursor:pointer;
}

.filter-btn.active{
background:rgba(255,255,255,.4);
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:15px;
padding:25px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
text-decoration:none;
color:inherit;
transition:.2s;
}

.card:hover{
transform:translateY(-6px);
}

.card.hidden{
display:none;
}

.card-icon{
font-size:3rem;
margin-bottom:15px;
}

.card-title{
font-size:1.5rem;
margin-bottom:10px;
}

.card-description{
color:#666;
margin-bottom:15px;
}

.tag{
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
padding:5px 12px;
border-radius:20px;
font-size:.85rem;
margin-right:6px;
}

/* FOOTER */

footer{
text-align:center;
color:white;
margin-top:40px;
}

footer a{
color:white;
text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

<header>

<h1>🎨 Htmlfun Gallery</h1>

<p class="subtitle">
AI-Generated Interactive Projects & Games
</p>

<a href="https://github.com/akshayai1996"
target="_blank"
class="github-profile-card">

<img
class="github-avatar"
src="https://github.com/akshayai1996.png">

<div class="github-info">

<div class="github-name"
id="ghName">
akshayai1996
</div>

<div class="github-sub">

<span class="github-dot"></span>

<span id="ghMeta">
View on GitHub
</span>

</div>
</div>
</a>

<div class="stats-container">

<div class="stat-card">
<div class="stat-number">17</div>
Projects
</div>

<div class="stat-card">
<div class="stat-number">100%</div>
AI Created
</div>

<div class="stat-card">
<div class="stat-number">0</div>
Dependencies
</div>

</div>

<input
class="search-box"
id="searchInput"
placeholder="🔍 Search projects...">

<div class="filter-container">

<button class="filter-btn active"
data-filter="all">
All </button>

<button class="filter-btn"
data-filter="game">
Games </button>

<button class="filter-btn"
data-filter="tool">
Tools </button>

<button class="filter-btn"
data-filter="visualization">
Visualizations </button>

</div>

</header>

<div class="gallery"
id="gallery">

<!-- KEEP YOUR EXISTING PROJECT CARDS EXACTLY HERE -->

</div>

<footer>

🤖 Built with AI | <a href="https://github.com/akshayai1996/Htmlfun"
target="_blank">
GitHub </a>

</footer>

</div>

<script>

/* SEARCH */

const searchInput=document.getElementById("searchInput")

const cards=document.querySelectorAll(".card")

searchInput.addEventListener("input",e=>{

const v=e.target.value.toLowerCase()

cards.forEach(c=>{

c.classList.toggle("hidden",
!c.textContent.toLowerCase().includes(v))

})

})

/* FILTER */

const buttons=document.querySelectorAll(".filter-btn")

buttons.forEach(b=>{

b.onclick=()=>{

buttons.forEach(x=>x.classList.remove("active"))

b.classList.add("active")

const f=b.dataset.filter

cards.forEach(c=>{

c.classList.toggle("hidden",

f!=="all"&&!c.dataset.tags.includes(f))

})

}

})

/* GitHub API ENRICHMENT */

fetch("https://api.github.com/users/akshayai1996")

.then(r=>r.json())

.then(data=>{

if(data.name)

document.getElementById("ghName").textContent=data.name

if(data.public_repos)

document.getElementById("ghMeta").textContent=

data.public_repos+" repos"

})

.catch(()=>{})

</script>

</body>
</html>
